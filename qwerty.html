<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ВИКТОРИНА (ДРУЖБА НАРОДОВ)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0a0e14;
            color: #edf3ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .app {
            width: 100%;
            max-width: 1400px;
            height: 98vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 12px 0;
            border-bottom: 2px solid #2f7fff;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #5d9eff;
            letter-spacing: -0.5px;
        }

        .info-pill {
            background: #182337;
            border: 2px solid #2f7fff;
            border-radius: 40px;
            padding: 6px 20px;
            font-size: 1rem;
            color: #b8d2ff;
            white-space: nowrap;
        }

        .card {
            background: #141e2c;
            border: 3px solid #2f7fff;
            border-radius: 40px;
            box-shadow: 0 15px 25px -5px rgba(0, 110, 255, 0.5);
            padding: 30px 20px;
        }

        .main-title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #4682ff;
            line-height: 1.2;
            margin-bottom: 20px;
            text-align: center;
        }

        .intro-text {
            background: #0f1825;
            border: 2px solid #2f7fff;
            border-radius: 40px;
            padding: 25px 20px;
            font-size: 1.2rem;
            color: #d1e2ff;
            margin: 20px 0 30px;
            line-height: 1.5;
            text-align: center;
        }

        .btn {
            background: transparent;
            border: 4px solid #2f7fff;
            color: #2f7fff;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 14px 40px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #12417c;
            letter-spacing: 1px;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .btn:hover {
            background: #2f7fff;
            color: #0b121f;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px #2f7fff;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #12417c;
        }

        .btn.centered {
            display: block;
            width: fit-content;
            min-width: 240px;
        }

        .progress-line {
            background: #1d2a3c;
            border: 2px solid #2f7fff;
            height: 14px;
            border-radius: 60px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-line-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2f7fff, #94c2ff);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #3a7fff;
        }

        .two-columns {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .question-panel {
            background: #101b29;
            border: 3px solid #2f7fff;
            border-radius: 40px;
            padding: 25px 20px;
            display: flex;
	    max-width: 60%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px #001a3a;
        }

        .question-panel p {
            font-size: 1.7rem;
            font-weight: 500;
            line-height: 1.4;
            color: #ffffff;
            text-shadow: 0 2px 5px #0044aa;
            margin-bottom: 15px;
            text-align: center;
        }

        .question-status {
            font-size: 1.1rem;
            color: #94c2ff;
            background: #1d2f45;
            padding: 8px 20px;
            border-radius: 40px;
            border: 2px solid #2f7fff;
            margin-top: 10px;
            text-align: center;
        }

        .answers-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            justify-content: center;
        }

        .answer-tile {
            background: #152334;
            border: 3px solid #2f7fff;
            border-radius: 30px;
            padding: 15px 18px;
            display: flex;
            align-items: center;
            transition: all 0.12s;
            box-shadow: 0 4px 0 #0f2642;
            width: 100%;
            min-height: 75px;
            position: relative;
        }

        .answer-tile:not(.locked):hover {
            background: #1e314b;
            border-color: #8ab9ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px #0045a3;
        }

        .answer-tile.selected {
            background: #004a99;
            border-color: #c2e1ff;
            box-shadow: 0 0 20px #0077ff, 0 4px 0 #002f5a;
        }

        .answer-tile.correct-answer {
            border-color: #4caf50;
            box-shadow: 0 0 20px #4caf50;
        }

        .answer-tile.correct-selected {
            background: #2e7d32;
            border-color: #81c784;
            box-shadow: 0 0 20px #4caf50;
        }

        .answer-tile.incorrect-selected {
            background: #c62828;
            border-color: #ff8a80;
            box-shadow: 0 0 20px #f44336;
        }

        .answer-tile.locked {
            cursor: default;
            opacity: 0.9;
        }

        .answer-tile.locked:hover {
            transform: none;
            box-shadow: 0 4px 0 #0f2642;
        }

        .answer-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: #eaf2ff;
            word-break: break-word;
            padding-left: 10px;
            flex: 1;
        }

        .answer-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: #2f7fff;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .answer-mark {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            margin-left: 5px;
        }

        .answer-tile.correct-selected .answer-mark::after,
        .answer-tile.correct-answer.correct-selected .answer-mark::after {
            content: "✓";
            color: #4caf50;
        }

        .answer-tile.incorrect-selected .answer-mark::after {
            content: "✗";
            color: #f44336;
        }

        .locked-message {
            text-align: center;
            margin-top: 10px;
            padding: 8px;
            background: #1d2f45;
            border-radius: 30px;
            border: 2px solid #2f7fff;
            color: #ffd700;
            font-size: 1rem;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .next-btn, .prev-btn {
            background: transparent;
            border: 4px solid #2f7fff;
            color: #2f7fff;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 5px 0 #12417c;
            flex: 1 1 auto;
            min-width: 130px;
        }

        .next-btn:hover:not(.disabled), .prev-btn:hover:not(.disabled) {
            background: #2f7fff20;
        }

        .next-btn:active:not(.disabled), .prev-btn:active:not(.disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #12417c;
        }

        .next-btn.disabled, .prev-btn.disabled {
            opacity: 0.2;
            pointer-events: none;
            border-color: #6581b0;
        }

        .result-container {
            background: #132131;
            border: 4px solid #2f7fff;
            border-radius: 50px;
            padding: 30px 20px;
            text-align: center;
            width: 100%;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .result-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #0f1e30;
            border: 6px solid #2f7fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px #2f7fff;
            animation: scaleUp 0.5s;
        }

        .result-circle .big-number {
            font-size: 3.8rem;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .result-circle .desc {
            font-size: 1.2rem;
            color: #adccff;
        }

        @keyframes scaleUp {
            0% { transform: scale(0.2); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .restart-button {
            background: transparent;
            border: 4px solid #2f7fff;
            color: #2f7fff;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 14px 45px;
            border-radius: 60px;
            margin: 15px auto 0;
            cursor: pointer;
            display: inline-block;
            box-shadow: 0 5px 0 #12417c;
        }

        .restart-button:hover {
            background: #2f7fff;
            color: #030f1f;
        }

        .hidden {
            display: none !important;
        }

        .flex-grow {
            flex: 1;
        }

        @media (min-width: 800px) {
            .two-columns {
                flex-direction: row;
            }
            .question-panel p {
                font-size: 2rem;
            }
            .answer-text {
                font-size: 1.4rem;
            }
            .logo {
                font-size: 1.8rem;
            }
            .info-pill {
                font-size: 1.1rem;
                padding: 8px 28px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2.2rem;
            }
            .intro-text {
                font-size: 1rem;
                padding: 20px 15px;
            }
            .btn {
                font-size: 1.5rem;
                padding: 12px 25px;
            }
            .question-panel p {
                font-size: 1.4rem;
            }
            .answer-letter {
                width: 32px;
                height: 32px;
                font-size: 1.2rem;
            }
            .answer-text {
                font-size: 1rem;
            }
            .next-btn, .prev-btn {
                font-size: 1.2rem;
                padding: 10px 15px;
                min-width: 100px;
            }
            .result-circle {
                width: 120px;
                height: 120px;
            }
            .result-circle .big-number {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <span class="logo">ВИКТОРИНА (ДРУЖБА НАРОДОВ)</span>
            <span class="info-pill">Дружба Народов</span>
        </div>

        <div id="startScreen" class="screen">
            <div class="card">
                <div class="main-title">ВИКТОРИНА</div>
                <div class="intro-text">
                    Добро пожаловать!<br><br>Здесь вы узнаете всё о дружбе народов.
                </div>
                <button class="btn centered" id="startBtn">НАЧАТЬ</button>
            </div>
        </div>

        <div id="quizScreen" class="screen hidden flex-grow" style="display: flex; flex-direction: column;">
            <div class="progress-line">
                <div class="progress-line-fill" id="progressFill"></div>
            </div>
            <div class="two-columns">
                <div class="question-panel">
                    <p id="questionText"></p>
                    <div class="question-status" id="questionStatus"></div>
                </div>
                <div class="answers-panel" id="answersPanel"></div>
            </div>
            <div class="locked-message hidden" id="lockedMessage">
                ⚠️ Этот вопрос уже отвечен. Изменить ответ нельзя.
            </div>
            <div class="nav-buttons">
                <button class="prev-btn" id="prevBtn">НАЗАД</button>
                <button class="next-btn" id="nextBtn">ДАЛЕЕ</button>
            </div>
        </div>

        <div id="resultScreen" class="screen hidden flex-grow" style="display: flex; align-items: center;">
            <div class="result-container">
                <h2 style="font-size: 2.8rem; color: #5f9eff; margin-bottom: 15px;">ИТОГ</h2>
                <div class="stats-row" id="statsRow"></div>
                <button class="restart-button" id="restartBtn">ЗАНОВО</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const baseQuestions = [
                { text: 'О каком народе идет речь? Их культура формировалась на перекрестке цивилизаций. Они славились как искусные ремесленники: художественная обработка металла, кожи, производство узорных тканей и золотое шитье. Главные праздники — Ораза байрам и Къурбан байрам.', answers: [ { label: 'Татары' }, { label: 'Крымские татары' }, { label: 'Башкиры' }, { label: 'Нанайцы' } ], correct: 1 },
                { text: 'Что такое «Кубете»?', answers: [ { label: 'Традиционный суп из баранины' }, { label: 'Ритуальный танец с саблями' }, { label: 'Пирог с мясом, визитная карточка крымскотатарской кухни' }, { label: 'Головной убор невесты' } ], correct: 2 },
                { text: 'Какие два народа здесь имеются в виду? Вак белеш (маленький пирог) и чак-чак — это знаменитые блюда соседних народов. Любители чак-чака приглашают на праздник Сабантуй, а любители вак белеш живут у подножия Уральских гор.', answers: [ { label: 'Русские и Украинцы' }, { label: 'Крымские татары и Буряты' }, { label: 'Татары и Башкиры' }, { label: 'Якуты и Нанайцы' } ], correct: 2 },
                { text: 'О каком народе идет речь? Духовная жизнь этого народа уникальна тем, что в ней причудливо переплелись древний шаманизм и буддизм. Здесь можно встретить и дацаны (буддийские монастыри), и священные рощи для обрядов обоо.', answers: [ { label: 'Якуты' }, { label: 'Крымские татары' }, { label: 'Башкиры' }, { label: 'Буряты' } ], correct: 3 },
                { text: 'Как правильно едят это блюдо, чтобы насладиться им сполна? Буузы (или позы) — это не просто еда, а настоящий культовый символ.', answers: [ { label: 'Вилкой и ножом, аккуратно разрезая на кусочки' }, { label: 'Только ложкой, выловив из супа' }, { label: 'Руками, чтобы не потерять драгоценный бульон внутри' }, { label: 'Вприкуску с кусочком сахара, как чай' } ], correct: 2 },
                { text: 'Как называется героический эпос якутов, который в 2005 году был включен ЮНЕСКО в список шедевров устного и нематериального культурного наследия человечества?', answers: [ { label: 'Калевала' }, { label: 'Джангар' }, { label: 'Олонхо' }, { label: 'Манас' } ], correct: 2 },
                { text: 'Какие два промысла были основой выживания для коренных народов Хабаровского края (например, нанайцев) на протяжении веков?', answers: [ { label: 'Оленеводство и охота на пушного зверя' }, { label: 'Рыболовство и охота' }, { label: 'Земледелие и скотоводство' }, { label: 'Добыча нефти и торговля пушниной' } ], correct: 1 },
                { text: 'Из кожи какой рыбы они делали теплые и водонепроницаемые халаты? Нанайцы — один из немногих народов мира, создавший уникальную технологию выделки кожи для изготовления одежды.', answers: [ { label: 'Акулы' }, { label: 'Осетра' }, { label: 'Рыбьей кожи (кеты, сазана, сома)' }, { label: 'Карпа' } ], correct: 2 },
                { text: 'Что такое «Строганина» и «Юкола»?', answers: [ { label: 'Старинные музыкальные инструменты' }, { label: 'Способы охоты на морского зверя' }, { label: 'Виды национальной борьбы' }, { label: 'Традиционные блюда из рыбы (севера и Дальнего Востока)' } ], correct: 3 },
                { text: 'Какое из правил взаимодействия, перечисленных в финале сценария, напрямую говорит о запрете на унижение человека по признаку его национальности?', answers: [ { label: 'Мы создаем условия для сохранения родного языка и культуры' }, { label: 'Мы организуем совместные мероприятия, объединяющие разные народы' }, { label: 'Мы не допускаем дискриминации по национальному признаку' }, { label: 'Мы обязуемся изучать и уважать традиции других народов' } ], correct: 2 }
            ];

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function shuffleQuestionsAndAnswers(questions) {
                const shuffledQuestions = shuffleArray([...questions]);
                
                return shuffledQuestions.map(q => {
                    const answersWithIndex = q.answers.map((answer, index) => ({
                        ...answer,
                        originalIndex: index
                    }));
                    
                    shuffleArray(answersWithIndex);
                    
                    const newCorrect = answersWithIndex.findIndex(a => a.originalIndex === q.correct);
                    
                    return {
                        text: q.text,
                        answers: answersWithIndex.map(a => ({ label: a.label })),
                        correct: newCorrect
                    };
                });
            }

            localStorage.clear();
            
            let questions = shuffleQuestionsAndAnswers(baseQuestions);
            let currentIndex = 0;
            let userAnswers = new Array(questions.length).fill(null);
            let quizCompleted = false;

            const startScreen = document.getElementById('startScreen');
            const quizScreen = document.getElementById('quizScreen');
            const resultScreen = document.getElementById('resultScreen');
            const startBtn = document.getElementById('startBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevBtn = document.getElementById('prevBtn');
            const restartBtn = document.getElementById('restartBtn');
            const questionText = document.getElementById('questionText');
            const questionStatus = document.getElementById('questionStatus');
            const answersPanel = document.getElementById('answersPanel');
            const progressFill = document.getElementById('progressFill');
            const statsRow = document.getElementById('statsRow');
            const lockedMessage = document.getElementById('lockedMessage');

            function checkAnswer(answerIndex) {
                const correctIndex = questions[currentIndex].correct;
                return answerIndex === correctIndex;
            }

            function isQuestionLocked() {
                return userAnswers[currentIndex] !== null;
            }

            function render() {
                const q = questions[currentIndex];
                const isLocked = isQuestionLocked();
                const userAnswer = userAnswers[currentIndex];
                
                questionText.innerText = q.text;
                
                if (isLocked) {
                    const isCorrect = checkAnswer(userAnswer);
                    questionStatus.innerText = isCorrect ? '✓ Правильно (ответ сохранён)' : '✗ Неправильно (ответ сохранён)';
                    questionStatus.style.color = isCorrect ? '#4caf50' : '#f44336';
                    lockedMessage.classList.remove('hidden');
                } else {
                    questionStatus.innerText = 'Выберите ответ';
                    questionStatus.style.color = '#94c2ff';
                    lockedMessage.classList.add('hidden');
                }

                let html = '';
                q.answers.forEach((ans, i) => {
                    const selected = (userAnswer === i);
                    let tileClass = 'answer-tile';
                    
                    if (isLocked) {
                        tileClass += ' locked';
                        
                        if (i === q.correct && selected) {
                            tileClass += ' correct-selected';
                        } else if (i === q.correct && !selected) {
                            tileClass += ' correct-answer';
                        } else if (selected && i !== q.correct) {
                            tileClass += ' incorrect-selected';
                        } else if (selected) {
                            tileClass += ' selected';
                        }
                    } else {
                        if (selected) {
                            tileClass += ' selected';
                        }
                    }
                    
                    const letter = String.fromCharCode(65 + i);
                    
                    html += `
                        <div class="${tileClass}" data-index="${i}">
                            <div class="answer-letter">${letter}</div>
                            <div class="answer-text">${ans.label}</div>
                            <div class="answer-mark"></div>
                        </div>
                    `;
                });
                answersPanel.innerHTML = html;

                if (!isLocked) {
                    document.querySelectorAll('.answer-tile').forEach(tile => {
                        tile.addEventListener('click', () => {
                            const idx = parseInt(tile.dataset.index);
                            userAnswers[currentIndex] = idx;
                            render();
                        });
                    });
                }

                updateNavigation();
                updateProgress();
            }

            function updateNavigation() {
                if (userAnswers[currentIndex] !== null && userAnswers[currentIndex] !== undefined) {
                    nextBtn.classList.remove('disabled');
                } else {
                    nextBtn.classList.add('disabled');
                }
                
                if (currentIndex === 0) {
                    prevBtn.classList.add('disabled');
                } else {
                    prevBtn.classList.remove('disabled');
                }
            }

            function updateProgress() {
                const answered = userAnswers.filter(a => a !== null).length;
                progressFill.style.width = (answered / questions.length) * 100 + '%';
            }

            function goNext() {
                if (nextBtn.classList.contains('disabled')) return;
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    render();
                } else {
                    quizCompleted = true;
                    showResults();
                }
            }

            function goPrev() {
                if (prevBtn.classList.contains('disabled')) return;
                currentIndex--;
                render();
            }

            function calculateScore() {
                let correctCount = 0;
                questions.forEach((q, i) => {
                    if (userAnswers[i] === q.correct) correctCount++;
                });
                return correctCount;
            }

            function showResults() {
                startScreen.classList.add('hidden');
                quizScreen.classList.add('hidden');
                resultScreen.classList.remove('hidden');

                const correct = calculateScore();
                const wrong = questions.length - correct;
                statsRow.innerHTML = `
                    <div class="result-circle"><span class="big-number">${correct}</span><span class="desc">верно</span></div>
                    <div class="result-circle"><span class="big-number">${wrong}</span><span class="desc">неверно</span></div>
                `;
            }

            function resetQuiz() {
                questions = shuffleQuestionsAndAnswers(baseQuestions);
                userAnswers = new Array(questions.length).fill(null);
                currentIndex = 0;
                quizCompleted = false;
                startScreen.classList.add('hidden');
                quizScreen.classList.remove('hidden');
                resultScreen.classList.add('hidden');
                render();
            }

            startBtn.addEventListener('click', resetQuiz);
            nextBtn.addEventListener('click', goNext);
            prevBtn.addEventListener('click', goPrev);
            restartBtn.addEventListener('click', resetQuiz);

            startScreen.classList.remove('hidden');
            quizScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
        })();
    </script>
</body>
</html>
