<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История в фразеологизмах</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0a0e14;
            color: #edf3ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 18px 0;
            border-bottom: 2px solid #2f7fff;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 600;
            color: #5d9eff;
            letter-spacing: -0.5px;
        }

        .info-pill {
            background: #182337;
            border: 2px solid #2f7fff;
            border-radius: 40px;
            padding: 8px 28px;
            font-size: 1.1rem;
            color: #b8d2ff;
        }

        .card {
            background: #141e2c;
            border: 3px solid #2f7fff;
            border-radius: 55px;
            box-shadow: 0 20px 35px -5px rgba(0, 110, 255, 0.5);
            padding: 45px 50px;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 700;
            color: #4682ff;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .intro-text {
            background: #0f1825;
            border: 2px solid #2f7fff;
            border-radius: 60px;
            padding: 35px 40px;
            font-size: 1.4rem;
            color: #d1e2ff;
            margin: 25px 0 40px;
            line-height: 1.6;
        }

        .btn {
            background: transparent;
            border: 4px solid #2f7fff;
            color: #2f7fff;
            font-size: 2.2rem;
            font-weight: 700;
            padding: 18px 65px;
            border-radius: 70px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 7px 0 #12417c;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: #2f7fff;
            color: #0b121f;
            transform: translateY(-4px);
            box-shadow: 0 15px 30px #2f7fff;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #12417c;
        }

        .btn.centered {
            display: block;
            margin: 0 auto;
            width: fit-content;
        }

        .progress-line {
            background: #1d2a3c;
            border: 2px solid #2f7fff;
            height: 18px;
            border-radius: 60px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-line-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2f7fff, #94c2ff);
            transition: width 0.3s ease;
            box-shadow: 0 0 15px #3a7fff;
        }

        .two-columns {
            display: flex;
            gap: 30px;
            flex: 1;
            min-height: 0;
        }

        .question-panel {
            flex: 1;
            background: #101b29;
            border: 3px solid #2f7fff;
            border-radius: 60px;
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 25px #001a3a;
        }

        .question-panel p {
            font-size: 2.3rem;
            font-weight: 500;
            line-height: 1.5;
            color: #ffffff;
            text-shadow: 0 2px 7px #0044aa;
            margin-bottom: 20px;
        }

        .question-status {
            font-size: 1.3rem;
            color: #94c2ff;
            background: #1d2f45;
            padding: 10px 25px;
            border-radius: 40px;
            border: 2px solid #2f7fff;
            margin-top: 15px;
        }

        .answers-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            justify-content: center;
        }

        .answer-tile {
            background: #152334;
            border: 3px solid #2f7fff;
            border-radius: 30px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            transition: all 0.12s;
            box-shadow: 0 5px 0 #0f2642;
            width: 100%;
            min-height: 90px;
            position: relative;
        }

        .answer-tile:not(.locked):hover {
            background: #1e314b;
            border-color: #8ab9ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px #0045a3;
        }

        .answer-tile.selected {
            background: #004a99;
            border-color: #c2e1ff;
            box-shadow: 0 0 25px #0077ff, 0 5px 0 #002f5a;
        }

        .answer-tile.correct-answer {
            border-color: #4caf50;
            box-shadow: 0 0 25px #4caf50;
        }

        .answer-tile.correct-selected {
            background: #2e7d32;
            border-color: #81c784;
            box-shadow: 0 0 25px #4caf50;
        }

        .answer-tile.incorrect-selected {
            background: #c62828;
            border-color: #ff8a80;
            box-shadow: 0 0 25px #f44336;
        }

        .answer-tile.locked {
            cursor: default;
            opacity: 0.9;
        }

        .answer-tile.locked:hover {
            transform: none;
            box-shadow: 0 5px 0 #0f2642;
        }

        .answer-text {
            font-size: 1.5rem;
            font-weight: 500;
            color: #eaf2ff;
            word-break: break-word;
            padding-left: 15px;
            flex: 1;
        }

        .answer-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: #2f7fff;
            border-radius: 15px;
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .answer-mark {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin-left: 10px;
        }

        .answer-tile.correct-selected .answer-mark::after,
        .answer-tile.correct-answer.correct-selected .answer-mark::after {
            content: "✓";
            color: #4caf50;
        }

        .answer-tile.incorrect-selected .answer-mark::after {
            content: "✗";
            color: #f44336;
        }

        .locked-message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #1d2f45;
            border-radius: 30px;
            border: 2px solid #2f7fff;
            color: #ffd700;
            font-size: 1.2rem;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .next-btn {
            background: transparent;
            border: 4px solid #2f7fff;
            color: #2f7fff;
            font-size: 2rem;
            font-weight: 700;
            padding: 16px 60px;
            border-radius: 70px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 0 #12417c;
        }

        .next-btn:hover:not(.disabled) {
            background: #2f7fff20;
        }

        .next-btn:active:not(.disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #12417c;
        }

        .next-btn.disabled {
            opacity: 0.2;
            pointer-events: none;
            border-color: #6581b0;
        }

        .prev-btn {
            background: transparent;
            border: 4px solid #2f7fff;
            color: #2f7fff;
            font-size: 2rem;
            font-weight: 700;
            padding: 16px 60px;
            border-radius: 70px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 0 #12417c;
        }

        .prev-btn:hover:not(.disabled) {
            background: #2f7fff20;
        }

        .prev-btn:active:not(.disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #12417c;
        }

        .prev-btn.disabled {
            opacity: 0.2;
            pointer-events: none;
            border-color: #6581b0;
        }

        .result-container {
            background: #132131;
            border: 4px solid #2f7fff;
            border-radius: 75px;
            padding: 50px 40px;
            text-align: center;
            width: 100%;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin: 40px 0;
        }

        .result-circle {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            background: #0f1e30;
            border: 6px solid #2f7fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 60px #2f7fff;
            animation: scaleUp 0.5s;
        }

        .result-circle .big-number {
            font-size: 5.2rem;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .result-circle .desc {
            font-size: 1.5rem;
            color: #adccff;
        }

        @keyframes scaleUp {
            0% { transform: scale(0.2); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .restart-button {
            background: transparent;
            border: 4px solid #2f7fff;
            color: #2f7fff;
            font-size: 2rem;
            font-weight: 700;
            padding: 18px 70px;
            border-radius: 70px;
            margin: 20px auto 0;
            cursor: pointer;
            display: inline-block;
            box-shadow: 0 7px 0 #12417c;
        }

        .restart-button:hover {
            background: #2f7fff;
            color: #030f1f;
        }

        .hidden {
            display: none !important;
        }

        .flex-grow {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <span class="logo">ФРАЗЕОЛОГИЗМЫ</span>
            <span class="info-pill">история слов</span>
        </div>

        <div id="startScreen" class="screen">
            <div class="card">
                <div class="main-title">ИСТОРИЯ<br>В ФРАЗЕОЛОГИЗМАХ</div>
                <div class="intro-text">
                    Добро пожаловать!<br><br>
                    16 вопросов о происхождении крылатых фраз.<br>Проверьте свою интуицию и откройте тайны языка.
                </div>
                <button class="btn centered" id="startBtn">НАЧАТЬ</button>
            </div>
        </div>

        <div id="quizScreen" class="screen hidden flex-grow" style="display: flex; flex-direction: column;">
            <div class="progress-line">
                <div class="progress-line-fill" id="progressFill"></div>
            </div>
            <div class="two-columns">
                <div class="question-panel">
                    <p id="questionText"></p>
                    <div class="question-status" id="questionStatus"></div>
                </div>
                <div class="answers-panel" id="answersPanel"></div>
            </div>
            <div class="locked-message hidden" id="lockedMessage">
                ⚠️ Этот вопрос уже отвечен. Изменить ответ нельзя.
            </div>
            <div class="nav-buttons">
                <button class="prev-btn" id="prevBtn">НАЗАД</button>
                <button class="next-btn" id="nextBtn">ДАЛЕЕ</button>
            </div>
        </div>

        <div id="resultScreen" class="screen hidden flex-grow" style="display: flex; align-items: center;">
            <div class="result-container">
                <h2 style="font-size: 3.5rem; color: #5f9eff; margin-bottom: 20px;">ИТОГ</h2>
                <div class="stats-row" id="statsRow"></div>
                <button class="restart-button" id="restartBtn">ЗАНОВО</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const baseQuestions = [
                { text: 'Что означает фразеологизм "Камень преткновения"?', answers: [ { label: 'препятствие на пути' }, { label: 'строительный материал' }, { label: 'памятник' }, { label: 'причина ссоры' } ], correct: 0 },
                { text: 'Откуда пошло выражение "Тришкин кафтан"?', answers: [ { label: 'из басни Крылова' }, { label: 'из сказки о портном' }, { label: 'из истории о царе' }, { label: 'из народной песни' } ], correct: 0 },
                { text: 'Что значит "Манна небесная"?', answers: [ { label: 'редкая удача' }, { label: 'вкусная еда' }, { label: 'неожиданная помощь' }, { label: 'сильный дождь' } ], correct: 2 },
                { text: 'Откуда выражение "А Васька слушает да ест"?', answers: [ { label: 'из поговорки' }, { label: 'из басни Крылова' }, { label: 'из сказки Пушкина' }, { label: 'из летописи' } ], correct: 1 },
                { text: 'Что означает "Сизифов труд"?', answers: [ { label: 'тяжелая работа' }, { label: 'бесполезный труд' }, { label: 'строительство' }, { label: 'наказание рабов' } ], correct: 1 },
                { text: 'Откуда пошло "Гордиев узел"?', answers: [ { label: 'из легенды о царе Мидасе' }, { label: 'из мифа о царе Гордии' }, { label: 'из сказаний о Геракле' }, { label: 'из истории Рима' } ], correct: 1 },
                { text: 'Что значит "Яблоко раздора"?', answers: [ { label: 'вкусный фрукт' }, { label: 'причина конфликта' }, { label: 'запретный плод' }, { label: 'символ власти' } ], correct: 1 },
                { text: 'Кто такой "Гадкий утенок"?', answers: [ { label: 'страшный ребенок' }, { label: 'некрасивая птица' }, { label: 'ставший прекрасным' }, { label: 'обиженный всеми' } ], correct: 2 },
                { text: 'Что означает "Танталовы муки"?', answers: [ { label: 'сильная боль' }, { label: 'недоступность желаемого' }, { label: 'голод и жажда' }, { label: 'вечные страдания' } ], correct: 1 },
                { text: 'Откуда выражение "Домоклов меч"?', answers: [ { label: 'из римской легенды' }, { label: 'из греческого мифа' }, { label: 'из библейских сказаний' }, { label: 'из средневековья' } ], correct: 1 },
                { text: 'Что означает выражение "Подвести под монастырь"?', answers: [ { label: 'отправить в ссылку' }, { label: 'поставить в трудное положение' }, { label: 'обратить в веру' }, { label: 'наказать провинившегося' } ], correct: 1 },
                { text: 'Что означает "Витать в облаках"?', answers: [ { label: 'летать высоко' }, { label: 'мечтать, не замечая реальности' }, { label: 'путешествовать' }, { label: 'смотреть на небо' } ], correct: 1 },
                { text: 'Когда говорят "Медведь на ухо наступил"?', answers: [ { label: 'когда сильно болит ухо' }, { label: 'когда человек злой' }, { label: 'когда нет музыкального слуха' }, { label: 'когда кто-то громко кричит' } ], correct: 2 },
                { text: 'Что значит "Работать спустя рукава"?', answers: [ { label: 'работать в одежде с длинными рукавами' }, { label: 'трудиться очень старательно' }, { label: 'делать кое-как, лениво' }, { label: 'помогать другим' } ], correct: 2 },
                { text: 'Что означает "Сесть в калошу"?', answers: [ { label: 'обуться' }, { label: 'оказаться в неловком положении' }, { label: 'испачкаться' }, { label: 'промочить ноги' } ], correct: 1 },
                { text: 'Когда говорят "Делать из мухи слона"?', answers: [ { label: 'увеличивать предмет' }, { label: 'сильно преувеличивать' }, { label: 'заниматься скульптурой' }, { label: 'шутить' } ], correct: 1 }
            ];

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function shuffleQuestionsAndAnswers(questions) {
                const shuffledQuestions = shuffleArray([...questions]);
                
                return shuffledQuestions.map(q => {
                    const answersWithIndex = q.answers.map((answer, index) => ({
                        ...answer,
                        originalIndex: index
                    }));
                    
                    shuffleArray(answersWithIndex);
                    
                    const newCorrect = answersWithIndex.findIndex(a => a.originalIndex === q.correct);
                    
                    return {
                        text: q.text,
                        answers: answersWithIndex.map(a => ({ label: a.label })),
                        correct: newCorrect
                    };
                });
            }

            localStorage.clear();
            
            let questions = shuffleQuestionsAndAnswers(baseQuestions);
            let currentIndex = 0;
            let userAnswers = new Array(questions.length).fill(null);
            let quizCompleted = false;

            const startScreen = document.getElementById('startScreen');
            const quizScreen = document.getElementById('quizScreen');
            const resultScreen = document.getElementById('resultScreen');
            const startBtn = document.getElementById('startBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevBtn = document.getElementById('prevBtn');
            const restartBtn = document.getElementById('restartBtn');
            const questionText = document.getElementById('questionText');
            const questionStatus = document.getElementById('questionStatus');
            const answersPanel = document.getElementById('answersPanel');
            const progressFill = document.getElementById('progressFill');
            const statsRow = document.getElementById('statsRow');
            const lockedMessage = document.getElementById('lockedMessage');

            function checkAnswer(answerIndex) {
                const correctIndex = questions[currentIndex].correct;
                return answerIndex === correctIndex;
            }

            function isQuestionLocked() {
                return userAnswers[currentIndex] !== null;
            }

            function render() {
                const q = questions[currentIndex];
                const isLocked = isQuestionLocked();
                const userAnswer = userAnswers[currentIndex];
                
                questionText.innerText = q.text;
                
                if (isLocked) {
                    const isCorrect = checkAnswer(userAnswer);
                    questionStatus.innerText = isCorrect ? '✓ Правильно (ответ сохранён)' : '✗ Неправильно (ответ заблокирован)';
                    questionStatus.style.color = isCorrect ? '#4caf50' : '#f44336';
                    lockedMessage.classList.remove('hidden');
                } else {
                    questionStatus.innerText = 'Выберите ответ';
                    questionStatus.style.color = '#94c2ff';
                    lockedMessage.classList.add('hidden');
                }

                let html = '';
                q.answers.forEach((ans, i) => {
                    const selected = (userAnswer === i);
                    let tileClass = 'answer-tile';
                    
                    if (isLocked) {
                        tileClass += ' locked';
                        
                        if (i === q.correct && selected) {
                            tileClass += ' correct-selected';
                        } else if (i === q.correct && !selected) {
                            tileClass += ' correct-answer';
                        } else if (selected && i !== q.correct) {
                            tileClass += ' incorrect-selected';
                        } else if (selected) {
                            tileClass += ' selected';
                        }
                    } else {
                        if (selected) {
                            tileClass += ' selected';
                        }
                    }
                    
                    const letter = String.fromCharCode(65 + i);
                    
                    html += `
                        <div class="${tileClass}" data-index="${i}">
                            <div class="answer-letter">${letter}</div>
                            <div class="answer-text">${ans.label}</div>
                            <div class="answer-mark"></div>
                        </div>
                    `;
                });
                answersPanel.innerHTML = html;

                if (!isLocked) {
                    document.querySelectorAll('.answer-tile').forEach(tile => {
                        tile.addEventListener('click', () => {
                            const idx = parseInt(tile.dataset.index);
                            userAnswers[currentIndex] = idx;
                            render();
                        });
                    });
                }

                updateNavigation();
                updateProgress();
            }

            function updateNavigation() {
                if (userAnswers[currentIndex] !== null && userAnswers[currentIndex] !== undefined) {
                    nextBtn.classList.remove('disabled');
                } else {
                    nextBtn.classList.add('disabled');
                }
                
                if (currentIndex === 0) {
                    prevBtn.classList.add('disabled');
                } else {
                    prevBtn.classList.remove('disabled');
                }
            }

            function updateProgress() {
                const answered = userAnswers.filter(a => a !== null).length;
                progressFill.style.width = (answered / questions.length) * 100 + '%';
            }

            function goNext() {
                if (nextBtn.classList.contains('disabled')) return;
                if (currentIndex < questions.length - 1) {
                    currentIndex++;
                    render();
                } else {
                    quizCompleted = true;
                    showResults();
                }
            }

            function goPrev() {
                if (prevBtn.classList.contains('disabled')) return;
                currentIndex--;
                render();
            }

            function calculateScore() {
                let correctCount = 0;
                questions.forEach((q, i) => {
                    if (userAnswers[i] === q.correct) correctCount++;
                });
                return correctCount;
            }

            function showResults() {
                startScreen.classList.add('hidden');
                quizScreen.classList.add('hidden');
                resultScreen.classList.remove('hidden');

                const correct = calculateScore();
                const wrong = questions.length - correct;
                statsRow.innerHTML = `
                    <div class="result-circle"><span class="big-number">${correct}</span><span class="desc">верно</span></div>
                    <div class="result-circle"><span class="big-number">${wrong}</span><span class="desc">неверно</span></div>
                `;
            }

            function resetQuiz() {
                questions = shuffleQuestionsAndAnswers(baseQuestions);
                userAnswers = new Array(questions.length).fill(null);
                currentIndex = 0;
                quizCompleted = false;
                startScreen.classList.add('hidden');
                quizScreen.classList.remove('hidden');
                resultScreen.classList.add('hidden');
                render();
            }

            startBtn.addEventListener('click', resetQuiz);
            nextBtn.addEventListener('click', goNext);
            prevBtn.addEventListener('click', goPrev);
            restartBtn.addEventListener('click', resetQuiz);

            startScreen.classList.remove('hidden');
            quizScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
        })();
    </script>
</body>
</html>
